<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <title>Продажби · Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #ffffff;
      --bg-1: #f6f6f7;
      --bg-2: #ececef;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.15);
      --text-1: #0a0a0a;
      --text-2: #6b6b73;
      --text-3: #a0a0a8;
      --accent: #2860e0;
      --accent-bg: rgba(40, 96, 224, 0.08);
      --accent-fg: #ffffff;
      --success: #0e9558;
      --success-bg: rgba(14, 149, 88, 0.1);
      --danger: #d83232;
      --danger-bg: rgba(216, 50, 50, 0.08);
      --success-stripe: rgba(255, 255, 255, 0.25);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-0: #0a0a0a;
        --bg-1: #161618;
        --bg-2: #222226;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text-1: #fafafa;
        --text-2: #a0a0a8;
        --text-3: #62626a;
        --accent: #4a85ff;
        --accent-bg: rgba(74, 133, 255, 0.15);
        --accent-fg: #ffffff;
        --success: #2dd585;
        --success-bg: rgba(45, 213, 133, 0.15);
        --danger: #ff5c5c;
        --danger-bg: rgba(255, 92, 92, 0.12);
        --success-stripe: rgba(255, 255, 255, 0.18);
      }
    }

    * { box-sizing: border-box; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-0);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'ss01', 'cv11';
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 560px;
      padding: 1.5rem 1.125rem 4rem;
    }

    .header { margin-bottom: 1.25rem; }
    .brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .brand-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
    .brand-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--text-1); color: var(--bg-0); display: flex; align-items: center; justify-content: center; }
    .brand-icon i { font-size: 15px; }
    .date-badge { font-size: 12px; color: var(--text-2); padding: 5px 12px; background: var(--bg-1); border-radius: 999px; font-variant-numeric: tabular-nums; }

    .tabs { display: inline-flex; gap: 2px; padding: 3px; background: var(--bg-1); border-radius: 999px; flex-wrap: wrap; }
    .tab { padding: 7px 14px; border-radius: 999px; font-size: 13px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: color .15s, background .15s; font-family: inherit; letter-spacing: -0.005em; }
    .tab:hover:not(.active) { color: var(--text-1); }
    .tab.active { background: var(--bg-0); color: var(--text-1); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 0.5px var(--border); }

    .view { padding-top: 4px; }
    .section { margin-bottom: 22px; }
    .section-title { font-size: 13px; font-weight: 500; color: var(--text-2); margin: 0 0 10px; display: flex; align-items: center; justify-content: space-between; letter-spacing: -0.005em; }

    .hero { background: var(--bg-1); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px; }
    .hero-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 8px; }
    .hero-label { font-size: 13px; color: var(--text-2); margin: 0; }
    .hero-trend { font-size: 11px; font-weight: 500; padding: 4px 9px; border-radius: 999px; background: var(--success-bg); color: var(--success); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .hero-trend.down { background: var(--danger-bg); color: var(--danger); }
    .hero-trend.neutral { background: var(--bg-2); color: var(--text-2); }
    .hero-num { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 42px; font-weight: 500; line-height: 1; font-variant-numeric: tabular-nums; margin: 0 0 4px; letter-spacing: -0.04em; }
    .hero-num .target { font-size: 18px; color: var(--text-3); font-weight: 500; margin-left: 4px; letter-spacing: -0.02em; }
    .hero-target { font-size: 12px; color: var(--text-2); margin: 0 0 14px; }
    .hero-bar { height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
    .hero-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s cubic-bezier(0.4, 0, 0.2, 1); }
    .hero-bar-fill.complete { background: var(--success); }
    .hero-bar-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); margin-top: 6px; font-variant-numeric: tabular-nums; }

    .spark { margin-top: 18px; }
    .spark-title { font-size: 11px; color: var(--text-3); margin: 0 0 8px; }
    .spark-svg { width: 100%; height: 44px; color: var(--accent); display: block; }
    .spark-labels { display: flex; justify-content: space-around; font-size: 10px; color: var(--text-3); margin-top: 6px; }
    .spark-labels .today { color: var(--text-1); font-weight: 500; }

    .bento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .bento-card { background: var(--bg-1); border-radius: var(--radius-md); padding: 14px 16px; }
    .bento-card .label { font-size: 12px; color: var(--text-2); margin: 0 0 6px; }
    .bento-card .num { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums; line-height: 1.1; margin: 0; letter-spacing: -0.025em; }
    .bento-card .num .of { font-family: 'Geist', sans-serif; font-size: 12px; color: var(--text-3); font-weight: 400; letter-spacing: 0; }
    .bento-card .sub { font-size: 11px; color: var(--text-3); margin: 4px 0 0; }
    .mini-bar { height: 4px; background: var(--bg-2); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .mini-bar div { height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(0.4, 0, 0.2, 1); }

    .goal-card { background: var(--bg-1); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 8px; }
    .goal-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
    .goal-card-name { font-size: 13px; font-weight: 500; color: var(--text-1); margin: 0; }
    .goal-card-num { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums; line-height: 1; margin: 0 0 8px; letter-spacing: -0.025em; }
    .goal-card-num .of { font-family: 'Geist', sans-serif; font-size: 13px; color: var(--text-3); font-weight: 400; letter-spacing: 0; }
    .goal-card-meta { font-size: 11px; color: var(--text-3); margin: 6px 0 0; display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }

    .trend-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--bg-1); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; }
    .trend-stat { padding: 12px 14px; }
    .trend-stat + .trend-stat { border-left: 0.5px solid var(--border); }
    .trend-stat-label { display: block; font-size: 11px; color: var(--text-2); margin-bottom: 4px; }
    .trend-stat-value { font-family: 'Geist Mono', ui-monospace, monospace; display: block; font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    .trend-stat-value small { font-family: 'Geist', sans-serif; font-size: 11px; color: var(--text-3); font-weight: 400; letter-spacing: 0; }
    .trend-chart { width: 100%; }
    .trend-svg { width: 100%; height: 96px; color: var(--accent); display: block; }
    .trend-x-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); margin-top: 6px; font-variant-numeric: tabular-nums; }
    .trend-x-labels .today { color: var(--success); font-weight: 500; }

    .item-list { display: flex; flex-direction: column; gap: 6px; }
    .item { display: flex; align-items: center; gap: 10px; background: var(--bg-0); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px; transition: border-color .15s; }
    .item:hover { border-color: var(--border-strong); }
    .cat-icon { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: 500; font-size: 13px; }
    .cat-icon.goal { background: var(--text-1); color: var(--bg-0); }
    .cat-icon.goal i { font-size: 16px; }
    .item-info { flex: 1; min-width: 0; overflow: hidden; }
    .item-name { font-size: 14px; font-weight: 500; line-height: 1.3; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.005em; }
    .item-meta { font-size: 11px; color: var(--text-2); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .points-pill { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 999px; background: var(--accent-bg); color: var(--accent); flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .points-pill.muted { background: var(--bg-1); color: var(--text-3); }
    .points-pill.multi { background: var(--bg-2); color: var(--text-2); font-family: 'Geist', sans-serif; font-variant-numeric: normal; }

    .edit-input { flex: 1; min-width: 0; padding: 7px 10px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 0.5px solid var(--accent); background: var(--bg-0); color: var(--text-1); outline: none; font-family: inherit; }
    .edit-pts-input { width: 56px; padding: 7px 8px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 0.5px solid var(--accent); background: var(--bg-0); color: var(--text-1); outline: none; font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; text-align: right; flex-shrink: 0; }
    .goal-svc-pts-readonly { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; font-family: 'Geist Mono', ui-monospace, monospace; flex-shrink: 0; }

    .counter { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .counter button { width: 30px; height: 30px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--bg-0); color: var(--text-1); cursor: pointer; font-size: 17px; line-height: 1; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-family: inherit; transition: background .15s, transform .1s; }
    .counter button:hover { background: var(--bg-1); }
    .counter button:active { transform: scale(0.92); }
    .counter .count { font-family: 'Geist Mono', ui-monospace, monospace; min-width: 24px; text-align: center; font-weight: 500; font-size: 15px; font-variant-numeric: tabular-nums; }

    .rank-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
    .rank-row .cat-icon { width: 30px; height: 30px; font-size: 12px; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 13px; font-weight: 500; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-bar { height: 4px; background: var(--bg-1); border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .rank-bar div { height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(0.4, 0, 0.2, 1); }
    .rank-value { font-family: 'Geist Mono', ui-monospace, monospace; text-align: right; font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; min-width: 36px; }

    .period-select { display: flex; gap: 2px; background: var(--bg-1); padding: 3px; border-radius: 999px; margin-bottom: 16px; }
    .period-btn { flex: 1; font-size: 12px; padding: 7px 10px; border: none; background: transparent; border-radius: 999px; cursor: pointer; color: var(--text-2); font-family: inherit; transition: background .15s, color .15s; }
    .period-btn.active { background: var(--bg-0); color: var(--text-1); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 0.5px var(--border); }

    .form-card { background: var(--bg-1); border-radius: var(--radius-md); padding: 14px; margin-top: 10px; }
    .form-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .form-row input { padding: 8px 12px; font-size: 13px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--bg-0); color: var(--text-1); outline: none; font-family: inherit; font-variant-numeric: tabular-nums; }
    .form-row input:focus { border-color: var(--accent); }
    .form-row input[type="text"] { flex: 1; min-width: 140px; }
    .form-row input[type="number"] { width: 70px; text-align: right; }
    .btn-primary { font-size: 13px; padding: 8px 14px; border-radius: 8px; border: none; background: var(--text-1); color: var(--bg-0); cursor: pointer; font-weight: 500; white-space: nowrap; font-family: inherit; display: inline-flex; align-items: center; gap: 4px; transition: opacity .15s, transform .1s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-icon { width: 30px; height: 30px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-2); cursor: pointer; padding: 0; display: inline-flex; align-items: center; justify-content: center; transition: background .15s, color .15s, border-color .15s; flex-shrink: 0; }
    .btn-icon:hover { background: var(--bg-1); color: var(--text-1); }
    .btn-icon.danger:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
    .btn-icon.active { background: var(--bg-0); color: var(--text-1); border-color: var(--border-strong); }
    .btn-icon.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .btn-icon.primary:hover { opacity: 0.9; background: var(--accent); color: var(--accent-fg); }
    .btn-icon i { font-size: 15px; }

    .target-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--bg-1); border-radius: var(--radius-md); margin-bottom: 6px; }
    .target-row label { font-size: 13px; }
    .target-row input { width: 90px; padding: 6px 10px; font-size: 13px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--bg-0); color: var(--text-1); text-align: right; font-variant-numeric: tabular-nums; outline: none; font-family: 'Geist Mono', ui-monospace, monospace; }
    .target-row input:focus { border-color: var(--accent); }

    .goal-editor { background: var(--bg-1); border-radius: var(--radius-md); padding: 16px; margin: -2px 0 8px; border: 0.5px solid var(--border); }
    .goal-editor-title { font-size: 11px; color: var(--text-3); margin: 0 0 10px; }
    .goal-editor-label { display: block; font-size: 11px; color: var(--text-2); margin: 14px 0 6px; font-weight: 500; letter-spacing: -0.005em; }
    .goal-editor-label:first-child { margin-top: 0; }
    .goal-editor-input { width: 100%; padding: 10px 12px; font-size: 14px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--bg-0); color: var(--text-1); outline: none; font-family: inherit; font-variant-numeric: tabular-nums; }
    .goal-editor-input:focus { border-color: var(--accent); }
    .goal-editor-footer { margin-top: 16px; padding-top: 14px; border-top: 0.5px solid var(--border); display: flex; justify-content: flex-end; }
    .btn-delete-goal { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--danger); background: transparent; border: 0.5px solid var(--danger); padding: 7px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 500; transition: background .15s, transform .1s; }
    .btn-delete-goal:hover { background: var(--danger-bg); }
    .btn-delete-goal:active { transform: scale(0.97); }
    .btn-settings { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-2); background: transparent; border: 0.5px solid var(--border-strong); padding: 5px 8px 5px 12px; border-radius: 999px; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; transition: background .15s, color .15s; flex-shrink: 0; }
    .btn-settings:hover { background: var(--bg-2); color: var(--text-1); }
    .btn-settings.active { background: var(--bg-2); color: var(--text-1); }
    .btn-settings svg { transition: transform .2s; }
    .btn-settings.active svg { transform: rotate(180deg); }
    .item-expanded { border-color: var(--border-strong); background: var(--bg-1); }
    .goal-svc-list { display: flex; flex-direction: column; gap: 4px; margin: 8px 0 0; }
    .goal-svc-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: var(--bg-0); border-radius: 8px; }
    .goal-svc-check { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; cursor: pointer; font-size: 13px; }
    .goal-svc-check input[type="checkbox"] { margin: 0; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); width: 16px; height: 16px; }
    .goal-svc-check .cat-icon { width: 22px; height: 22px; font-size: 11px; flex-shrink: 0; }
    .goal-svc-check span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
    .goal-svc-pts { display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .goal-svc-pts input { width: 68px; padding: 5px 8px; font-size: 12px; border-radius: 6px; border: 0.5px solid var(--border-strong); background: var(--bg-1); color: var(--text-1); outline: none; text-align: right; font-variant-numeric: tabular-nums; font-family: 'Geist Mono', ui-monospace, monospace; }
    .goal-svc-pts input:disabled { opacity: 0.3; background: transparent; }
    .goal-svc-pts input:focus { border-color: var(--accent); background: var(--bg-0); }
    .goal-svc-pts .unit { font-size: 11px; color: var(--text-3); width: 12px; }

    .empty { text-align: center; padding: 28px 16px; color: var(--text-2); font-size: 13px; background: var(--bg-1); border-radius: var(--radius-md); }
    .empty i { font-size: 28px; opacity: 0.4; margin-bottom: 8px; display: inline-block; color: var(--text-3); }
    .empty p { margin: 0; }
    .helper { font-size: 12px; color: var(--text-2); margin: 0 0 10px; }

    /* Top stats row on dashboard */
    .top-stats { display: grid; grid-template-columns: 1fr 1fr; background: var(--bg-1); border-radius: var(--radius-md); margin-bottom: 16px; overflow: hidden; }
    .top-stat { padding: 12px 14px; }
    .top-stat + .top-stat { border-left: 0.5px solid var(--border); }
    .top-stat-label { display: block; font-size: 11px; color: var(--text-2); margin-bottom: 4px; }
    .top-stat-value { font-family: 'Geist Mono', ui-monospace, monospace; display: block; font-size: 20px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    .top-stat-value small { font-family: 'Geist', sans-serif; font-size: 11px; color: var(--text-3); font-weight: 400; letter-spacing: 0; }

    /* Goals grid - side by side on dashboard */
    .goals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .goals-grid.single { grid-template-columns: 1fr; }
    .goals-grid .goal-card { margin-bottom: 0; padding: 12px 14px; min-width: 0; }
    .goals-grid .goal-card-num { font-size: 20px; }
    .goals-grid .goal-card-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .goals-grid .hero-trend, .goals-grid .celebration-pill { font-size: 10px; padding: 3px 7px; }
    @media (max-width: 360px) {
      .goals-grid:not(.single) { gap: 6px; }
      .goals-grid .goal-card { padding: 10px 12px; }
    }

    /* Date picker for Sales view */
    .date-picker-section { background: var(--bg-1); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 16px; }
    .date-picker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .date-picker-label { font-size: 11px; color: var(--text-2); font-weight: 500; letter-spacing: -0.005em; }
    .date-input { width: 100%; padding: 10px 12px; font-size: 14px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--bg-0); color: var(--text-1); outline: none; font-family: inherit; font-variant-numeric: tabular-nums; -webkit-appearance: none; appearance: none; min-height: 40px; }
    .date-input:focus { border-color: var(--accent); }
    .date-input::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.55; }
    @media (prefers-color-scheme: dark) {
      .date-input::-webkit-calendar-picker-indicator { filter: invert(0.85); }
    }
    .btn-today { padding: 4px 10px; font-size: 11px; border-radius: 999px; border: 0.5px solid var(--border-strong); background: var(--bg-0); color: var(--text-2); cursor: pointer; font-family: inherit; font-weight: 500; transition: background .15s, color .15s; display: inline-flex; align-items: center; gap: 4px; }
    .btn-today:hover { background: var(--bg-2); color: var(--text-1); }

    /* Celebration when goal complete */
    .celebration-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px 4px 8px;
      border-radius: 999px;
      background: var(--success-bg);
      color: var(--success);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      animation: celebrate-pulse 2.2s ease-in-out infinite;
    }
    .celebration-pill svg { animation: sparkle-spin 3.5s ease-in-out infinite; }
    @keyframes celebrate-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes sparkle-spin {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); }
    }
    .hero-complete .hero-num,
    .goal-card-complete .goal-card-num { color: var(--success); }

    /* Bar with overage (two segments) */
    .hero-bar.with-overage { display: flex; gap: 1px; }
    .hero-bar.with-overage .hero-bar-fill { border-radius: 3px 0 0 3px; }
    .hero-bar-overage {
      height: 100%;
      background-color: var(--success);
      background-image: repeating-linear-gradient(
        45deg,
        var(--success-stripe) 0 3px,
        transparent 3px 6px
      );
      border-radius: 0 3px 3px 0;
      transition: width .5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Overage meta text */
    .overage-meta { color: var(--success); }
    .overage-meta span { font-weight: 500; }
    .overage-meta span:last-child { font-weight: 600; }
    .complete-meta { color: var(--success); font-weight: 500; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <h2 class="brand-title">
          <span class="brand-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
          Продажби
        </h2>
        <span class="date-badge" id="date"></span>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab active" data-view="dashboard">Табло</button>
        <button class="tab" data-view="sales">Продажби</button>
        <button class="tab" data-view="analysis">Анализ</button>
        <button class="tab" data-view="settings">Настройки</button>
      </div>
    </header>
    <main id="view" class="view"></main>
  </div>

<script>
'use strict';

const STORAGE_KEY = 'sales_tracker_v3';
const SCHEMA = 4;
const MONTHS = ['януари','февруари','март','април','май','юни','юли','август','септември','октомври','ноември','декември'];
const MONTHS_SHORT = ['яну','фев','мар','апр','май','юни','юли','авг','сеп','окт','ное','дек'];
const DAYS_BG = ['нд','пн','вт','ср','чт','пт','сб'];
const SERVICE_COLORS = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517'];

const ICONS = {
  brand: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  edit: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  trash: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14H7L5 6"/><path d="M10 11v6M14 11v6"/></svg>',
  check: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  x: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  plus: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  plusCircle: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.4; margin-bottom:8px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
  chartBarOff: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.4; margin-bottom:8px"><path d="M3 3l18 18"/><path d="M9 12v7M15 8v11M3 20h18"/></svg>',
};

const uid = p => `${p}_${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const round = n => Math.round(n || 0);
const fmt = n => { const v = Number(n) || 0; if (Number.isInteger(v)) return String(v); return parseFloat(v.toFixed(2)).toString(); };
const localISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayISO = () => localISO(new Date());
const formatDate = iso => { const d = new Date(iso); return `${d.getDate()} ${MONTHS[d.getMonth()]}`; };

function serviceColor(id) {
  if (!id) return '#888780';
  let h = 0;
  for (const c of String(id)) h = (h * 31 + c.charCodeAt(0)) | 0;
  return SERVICE_COLORS[Math.abs(h) % SERVICE_COLORS.length];
}
const initial = name => String(name || '?').charAt(0).toUpperCase();

function isInPeriod(iso, period) {
  if (period === 'all') return true;
  if (period === 'today') return iso === todayISO();
  if (period === 'month') return iso.slice(0,7) === todayISO().slice(0,7);
  if (period === 'week') { const s = new Date(); s.setDate(s.getDate() - 6); return iso >= localISO(s); }
  return false;
}

const defaultState = () => {
 const s1 = uid('s'), s2 = uid('s');
  return {
    version: SCHEMA,
    services: [
      { id: s1, name: 'Консултация', points: 5 },
      { id: s2, name: 'Почистване', points: 3 }
    ],
    goals: [{ id: uid('g'), name: 'Месечна цел', target: 400, period: 'month', services: [s1, s2] }],
    sales: [],
  };
};

function migrate(old) {
  let data = { ...old };
  if (!data.version || data.version < 2) {
    const services = (data.services || []).map(s => ({ id: s.id, name: s.name }));
    const validIds = new Set(services.map(s => s.id));
    const goalServices = (data.services || []).map(s => ({ serviceId: s.id, points: s.points || 1 }));
    const goals = services.length ? [{ id: uid('g'), name: 'Месечна цел', target: data.targets?.monthly || 400, services: goalServices }] : [];
    const sales = (data.sales || []).filter(s => validIds.has(s.refId)).map(s => ({ id: s.id, date: s.date, serviceId: s.refId }));
    data = { version: 2, services, goals, sales, dailyTarget: 5 };
  }
  if (data.version === 2) {
    data.goals = (data.goals || []).map(g => ({ ...g, period: g.period || 'month' }));
    if (data.dailyTarget > 0 && data.services?.length > 0) {
      data.goals.push({
        id: uid('g'),
        name: 'Брой продажби',
        target: data.dailyTarget,
        period: 'day',
        services: data.services.map(s => ({ serviceId: s.id, points: 1 }))
      });
    }
    delete data.dailyTarget;
    data.version = 3;
  }
  if (data.version === 3) {
    const servicePoints = {};
    for (const g of data.goals || []) {
      for (const e of g.services || []) {
        if (!e || !e.serviceId) continue;
        const pts = parseFloat(e.points) || 0;
        if (servicePoints[e.serviceId] === undefined || pts > servicePoints[e.serviceId]) {
          servicePoints[e.serviceId] = pts;
        }
      }
    }
    data.services = (data.services || []).map(s => ({ ...s, points: s.points ?? servicePoints[s.id] ?? 1 }));
    data.goals = (data.goals || []).map(g => ({
      ...g,
      services: (g.services || []).map(e => typeof e === 'string' ? e : e?.serviceId).filter(Boolean)
    }));
    data.version = 4;
  }
  return { ...defaultState(), ...data, version: SCHEMA };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const data = JSON.parse(raw);
    return data.version === SCHEMA ? data : migrate(data);
  } catch { return defaultState(); }
}
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

let state = loadState();
let currentView = 'dashboard';
let currentPeriod = 'month';
let currentSaleDate = todayISO();
let editingGoalId = null;
let editingServiceId = null;

const salesInPeriod = p => state.sales.filter(s => isInPeriod(s.date, p));

function pointsForGoal(g, sales) {
  let t = 0;
  for (const s of sales) {
    if (g.services.includes(s.serviceId)) {
      const svc = state.services.find(x => x.id === s.serviceId);
      t += svc?.points || 0;
    }
  }
  return t;
}

function serviceGoalsInfo(serviceId) {
  const inGoals = state.goals.filter(g => g.services.includes(serviceId));
  const svc = state.services.find(s => s.id === serviceId);
  const points = svc?.points || 0;
  const breakdown = inGoals.map(g => ({ name: g.name, points, period: g.period }));
  const totalPoints = breakdown.reduce((sum, b) => sum + b.points, 0);
  return { count: inGoals.length, totalPoints, breakdown, names: inGoals.map(g => g.name) };
}

function countByService(sales) {
  const m = {};
  for (const s of sales) m[s.serviceId] = (m[s.serviceId] || 0) + 1;
  return m;
}
function refName(id) { return state.services.find(s => s.id === id)?.name || 'Изтрита'; }

function last7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push({ iso: localISO(d), label: DAYS_BG[d.getDay()] });
  }
  return days;
}
function pointsPerDayForGoal(goal) {
  return last7Days().map(d => {
    const ds = state.sales.filter(s => s.date === d.iso);
    return { ...d, points: pointsForGoal(goal, ds) };
  });
}
function currentMonthStats() {
  const now = new Date();
  const year = now.getFullYear();
  const monthIdx = now.getMonth();
  const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
  const todayIso = todayISO();
  const days = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, monthIdx, d);
    const iso = localISO(date);
    const ds = state.sales.filter(s => s.date === iso);
    const points = state.goals.reduce((sum, g) => sum + pointsForGoal(g, ds), 0);
    days.push({ iso, day: d, month: monthIdx, points, count: ds.length, isFuture: iso > todayIso, isToday: iso === todayIso });
  }
  return days;
}
function trendForGoal(goal) {
  if (goal.period === 'day') {
    const today = pointsForGoal(goal, state.sales.filter(s => s.date === todayISO()));
    const y = new Date(); y.setDate(y.getDate() - 1);
    const yIso = localISO(y);
    const prev = pointsForGoal(goal, state.sales.filter(s => s.date === yIso));
    if (prev === 0 && today === 0) return null;
    if (prev === 0) return { label: 'нов ден' };
    return { pct: ((today - prev) / prev) * 100 };
  }
  const now = new Date();
  const thisMonth = todayISO().slice(0,7);
  const lm = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const lastMonth = `${lm.getFullYear()}-${String(lm.getMonth()+1).padStart(2,'0')}`;
  const dom = now.getDate();
  const cur = pointsForGoal(goal, state.sales.filter(s => s.date.startsWith(thisMonth)));
  const prev = pointsForGoal(goal, state.sales.filter(s => s.date.startsWith(lastMonth) && parseInt(s.date.slice(8)) <= dom));
  if (prev === 0 && cur === 0) return null;
  if (prev === 0) return { label: 'нов месец' };
  return { pct: ((cur - prev) / prev) * 100 };
}

function logSale(serviceId, delta) {
  if (delta > 0) state.sales.push({ id: uid('sale'), date: currentSaleDate, serviceId });
  else {
    for (let i = state.sales.length - 1; i >= 0; i--) {
      if (state.sales[i].date === currentSaleDate && state.sales[i].serviceId === serviceId) { state.sales.splice(i, 1); break; }
    }
  }
  saveState(state); render();
}
function addService(name, points) {
  if (!name) return 'invalid';
  if (state.services.some(s => s.name === name)) return 'exists';
  state.services.push({ id: uid('s'), name, points: points ?? 1 });
  saveState(state); render(); return 'ok';
}
function removeService(id) {
  state.services = state.services.filter(s => s.id !== id);
  for (const g of state.goals) g.services = g.services.filter(sId => sId !== id);
  if (editingServiceId === id) editingServiceId = null;
  saveState(state); render();
}
function startEditService(id) {
  editingServiceId = id;
  render();
  setTimeout(() => {
    const inp = document.getElementById('edit-svc-name');
    if (inp) { inp.focus(); inp.select(); }
  }, 0);
}
function saveEditService() {
  const inp = document.getElementById('edit-svc-name');
  const ptsInp = document.getElementById('edit-svc-points');
  if (!inp || !editingServiceId) { editingServiceId = null; render(); return; }
  const newName = inp.value.trim();
  if (!newName) { editingServiceId = null; render(); return; }
  if (state.services.some(other => other.id !== editingServiceId && other.name === newName)) {
    alert('Услуга с това име вече съществува.'); return;
  }
  const s = state.services.find(x => x.id === editingServiceId);
  if (s) {
    s.name = newName;
    if (ptsInp) {
      const pts = parseFloat(ptsInp.value);
      s.points = isFinite(pts) ? Math.max(0, pts) : 0;
    }
  }
  editingServiceId = null;
  saveState(state); render();
}
function cancelEditService() { editingServiceId = null; render(); }

function addGoal(name, target, period) {
  if (!name || !(target > 0)) return 'invalid';
  state.goals.push({ id: uid('g'), name, target: round(target), period: period || 'month', services: [] });
  saveState(state); render(); return 'ok';
}
function removeGoal(id) {
  state.goals = state.goals.filter(g => g.id !== id);
  if (editingGoalId === id) editingGoalId = null;
  saveState(state); render();
}
function updateGoal(id, field, value) {
  const g = state.goals.find(g => g.id === id);
  if (!g) return;
  if (field === 'name') g.name = String(value).trim() || g.name;
  else if (field === 'target') g.target = Math.max(0, round(value));
  saveState(state); render();
}
function toggleServiceInGoal(goalId, serviceId) {
  const g = state.goals.find(g => g.id === goalId);
  if (!g) return;
  const i = g.services.indexOf(serviceId);
  if (i >= 0) g.services.splice(i, 1);
  else g.services.push(serviceId);
  saveState(state); render();
}
function setServicePoints(serviceId, points) {
  const s = state.services.find(x => x.id === serviceId);
  if (s) {
    const v = parseFloat(points);
    s.points = isFinite(v) ? Math.max(0, v) : 0;
    saveState(state); render();
  }
}
function toggleEditGoal(id) { editingGoalId = editingGoalId === id ? null : id; render(); }

function renderSpark(values) {
  const max = Math.max(1, ...values.map(d => d.points));
  const w = 280, h = 44, gap = 4;
  const bw = (w - gap * 6) / 7;
  const bars = values.map((d, i) => {
    const bh = d.points > 0 ? Math.max(3, (d.points / max) * h) : 3;
    return `<rect x="${i * (bw + gap)}" y="${h - bh}" width="${bw}" height="${bh}" rx="2" fill="currentColor" opacity="${d.points > 0 ? 1 : 0.18}"/>`;
  }).join('');
  return `<svg class="spark-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}</svg>`;
}

function renderTrendChart() {
  const days = currentMonthStats();
  const pastDays = days.filter(d => !d.isFuture);
  const max = Math.max(1, ...pastDays.map(d => d.count));
  const total = pastDays.reduce((s, d) => s + d.count, 0);
  const activeDays = pastDays.filter(d => d.count > 0).length;
  const avg = activeDays > 0 ? total / activeDays : 0;
  const best = pastDays.reduce((b, d) => d.count > b.count ? d : b, { count: 0, day: 0, month: 0 });
  const monthName = MONTHS[days[0].month];
  const monthShort = MONTHS_SHORT[days[0].month];
  const daysInMonth = days.length;

  const w = 300, h = 96, gap = 1;
  const bw = (w - gap * (daysInMonth - 1)) / daysInMonth;

  const successColor = getComputedStyle(document.documentElement).getPropertyValue('--success').trim() || '#10a866';

  const bars = days.map((d, i) => {
    const x = i * (bw + gap);
    if (d.isFuture) {
      return `<rect x="${x}" y="${h - 2}" width="${bw}" height="2" rx="1" fill="currentColor" opacity="0.08"/>`;
    }
    const bh = d.count > 0 ? Math.max(2, (d.count / max) * h) : 2;
    return `<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" rx="1.5" fill="${d.isToday ? successColor : 'currentColor'}" opacity="${d.count > 0 ? 1 : 0.15}"/>`;
  }).join('');

  const avgY = avg > 0 ? h - (avg / max) * h : h;
  const avgLine = avg > 0 ? `<line x1="0" y1="${avgY}" x2="${w}" y2="${avgY}" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>` : '';

  const midDay = Math.ceil(daysInMonth / 2);
  const bestLabel = best.count > 0 ? `${best.day} ${monthShort}` : '—';

  return `
    <div class="section">
      <h3 class="section-title">Активност · ${monthName}</h3>
      <div class="trend-stats">
        <div class="trend-stat">
          <span class="trend-stat-label">Продажби</span>
          <span class="trend-stat-value">${total}</span>
        </div>
        <div class="trend-stat">
          <span class="trend-stat-label">Средно/ден</span>
          <span class="trend-stat-value">${fmt(avg)}</span>
        </div>
        <div class="trend-stat">
          <span class="trend-stat-label">Най-добър</span>
          <span class="trend-stat-value">${best.count}<small> · ${bestLabel}</small></span>
        </div>
      </div>
      <div class="trend-chart">
        <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" class="trend-svg">
          ${avgLine}
          ${bars}
        </svg>
        <div class="trend-x-labels">
          <span>1 ${monthShort}</span>
          <span>${midDay}</span>
          <span>${daysInMonth} ${monthShort}</span>
        </div>
      </div>
    </div>
  `;
}

function render() {
  document.getElementById('date').textContent = formatDate(todayISO());
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === currentView));
  const v = document.getElementById('view');
  v.innerHTML = ({ dashboard: renderDashboard, sales: renderSales, analysis: renderAnalysis, settings: renderSettings }[currentView] || renderDashboard)();
}

function renderGoalCard(g) {
  const periodKey = g.period === 'day' ? 'today' : 'month';
  const periodSales = salesInPeriod(periodKey);
  const points = pointsForGoal(g, periodSales);
  const rawPct = g.target > 0 ? (points / g.target) * 100 : 0;
  const displayPct = Math.min(100, rawPct);
  const isComplete = g.target > 0 && points >= g.target;
  const overage = isComplete ? points - g.target : 0;
  const remaining = Math.max(0, g.target - points);

  const goalSales = periodSales.filter(s => g.services.includes(s.serviceId));
  const avgPerSale = goalSales.length > 0 ? points / goalSales.length : 0;
  const extraSales = avgPerSale > 0 ? Math.round(overage / avgPerSale) : 0;

  const trend = trendForGoal(g);
  let badgeHtml = '';
  if (isComplete) {
    badgeHtml = `<span class="celebration-pill"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.5 7 7 2.5-7 2.5-2.5 7-2.5-7-7-2.5 7-2.5z"/></svg>Постигната</span>`;
  } else if (trend) {
    if (trend.label) badgeHtml = `<span class="hero-trend neutral">${trend.label}</span>`;
    else { const up = trend.pct >= 0; badgeHtml = `<span class="hero-trend ${up ? '' : 'down'}">${up ? '↑' : '↓'} ${round(Math.abs(trend.pct))}%</span>`; }
  }

  let barHtml;
  if (overage > 0) {
    const targetW = (g.target / points) * 100;
    const overW = (overage / points) * 100;
    barHtml = `<div class="hero-bar with-overage"><div class="hero-bar-fill complete" style="width:${targetW}%"></div><div class="hero-bar-overage" style="width:${overW}%"></div></div>`;
  } else {
    barHtml = `<div class="hero-bar"><div class="hero-bar-fill ${isComplete ? 'complete' : ''}" style="width:${displayPct}%"></div></div>`;
  }

  let metaHtml;
  if (overage > 0) {
    metaHtml = `<div class="goal-card-meta overage-meta"><span>+${extraSales} продажби</span><span>${round(rawPct)}%</span></div>`;
  } else if (isComplete) {
    metaHtml = `<div class="goal-card-meta complete-meta"><span>Точно постигната</span><span>100%</span></div>`;
  } else {
    metaHtml = `<div class="goal-card-meta"><span>${round(displayPct)}%</span><span>${fmt(remaining)} т. оставащи</span></div>`;
  }

  return `
    <div class="goal-card ${isComplete ? 'goal-card-complete' : ''}">
      <div class="goal-card-top">
        <p class="goal-card-name">${esc(g.name)}</p>
        ${badgeHtml}
      </div>
      <p class="goal-card-num">${fmt(points)}<span class="of"> / ${round(g.target)}</span></p>
      ${barHtml}
      ${metaHtml}
    </div>`;
}

function renderDashboard() {
  const today = salesInPeriod('today');
  const month = salesInPeriod('month');

  const goalsAchieved = state.goals.filter(g => {
    if (g.target <= 0) return false;
    const ps = g.period === 'day' ? today : month;
    return pointsForGoal(g, ps) >= g.target;
  }).length;
  const totalGoals = state.goals.length;

  const counts = countByService(month);
  const ranks = Object.entries(counts).map(([id, c]) => ({ id, name: refName(id), count: c })).sort((a,b) => b.count - a.count).slice(0, 5);
  const maxRank = Math.max(1, ...ranks.map(r => r.count));

  const monthlyGoals = state.goals.filter(g => g.period === 'month');
  const dailyGoals = state.goals.filter(g => g.period === 'day');

  return `
    <div class="top-stats">
      <div class="top-stat">
        <span class="top-stat-label">Продажби днес</span>
        <span class="top-stat-value">${today.length}</span>
      </div>
      <div class="top-stat">
        <span class="top-stat-label">Постигнати цели</span>
        <span class="top-stat-value">${goalsAchieved}<small> / ${totalGoals}</small></span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">Дневни цели · днес</h3>
      ${dailyGoals.length ? `
        <div class="goals-grid ${dailyGoals.length === 1 ? 'single' : ''}">
          ${dailyGoals.map(g => renderGoalCard(g)).join('')}
        </div>
      ` : `
        <div class="empty">
          <p>Все още нямаш дневни цели.</p>
          <p style="margin-top:6px;font-size:11px">Дневните цели се нулират всеки ден.</p>
        </div>
      `}
    </div>

    <div class="section">
      <h3 class="section-title">Месечни цели · ${MONTHS[new Date().getMonth()]}</h3>
      ${monthlyGoals.length ? `
        <div class="goals-grid ${monthlyGoals.length === 1 ? 'single' : ''}">
          ${monthlyGoals.map(g => renderGoalCard(g)).join('')}
        </div>
      ` : `
        <div class="empty">
          <p>Все още нямаш месечни цели.</p>
          <p style="margin-top:6px;font-size:11px">Иди в Настройки, за да създадеш първата си цел.</p>
        </div>
      `}
    </div>

    ${ranks.length ? `
    <div class="section">
      <h3 class="section-title">Топ услуги за месеца</h3>
      <div>${ranks.map(r => { const c = serviceColor(r.id); return `
        <div class="rank-row">
          <div class="cat-icon" style="background:${c}">${initial(r.name)}</div>
          <div class="rank-info">
            <p class="rank-name">${esc(r.name)}</p>
            <div class="rank-bar"><div style="width:${(r.count / maxRank) * 100}%; background:${c}"></div></div>
          </div>
          <div class="rank-value">${r.count}</div>
        </div>`; }).join('')}</div>
    </div>` : ''}
  `;
}

function renderSales() {
  const isToday = currentSaleDate === todayISO();
  const todayIso = todayISO();
  const saleDaySales = state.sales.filter(s => s.date === currentSaleDate);
  const counts = countByService(saleDaySales);
  const totalDay = saleDaySales.length;
  const dateLabel = isToday ? 'днес' : formatDate(currentSaleDate);

  const row = (s) => {
    const c = counts[s.id] || 0;
    const info = serviceGoalsInfo(s.id);
    let meta, pillTxt, pillCls;
    if (info.count === 0) {
      meta = 'не носи точки за никоя цел';
      pillCls = 'muted';
      pillTxt = '—';
    } else if (info.count === 1) {
      const p = info.breakdown[0];
      meta = `→ ${esc(p.name)}`;
      pillCls = '';
      pillTxt = `${fmt(p.points)} т.`;
    } else {
      meta = info.breakdown.map(p => `${esc(p.name)} ${fmt(p.points)}т.`).join(' · ');
      pillCls = 'multi';
      pillTxt = `${info.count} цели`;
    }
    return `
      <div class="item">
        <div class="cat-icon" style="background:${serviceColor(s.id)}">${initial(s.name)}</div>
        <div class="item-info">
          <p class="item-name">${esc(s.name)}</p>
          <p class="item-meta">${meta}</p>
        </div>
        <span class="points-pill ${pillCls}">${pillTxt}</span>
        <div class="counter">
          <button data-action="dec" data-id="${s.id}" aria-label="Намали">−</button>
          <span class="count">${c}</span>
          <button data-action="inc" data-id="${s.id}" aria-label="Увеличи">+</button>
        </div>
      </div>`;
  };

  return `
    <div class="date-picker-section">
      <div class="date-picker-header">
        <span class="date-picker-label">Записвай продажби за</span>
        ${!isToday ? `<button class="btn-today" data-action="set-today">↺ Към днес</button>` : ''}
      </div>
      <input type="date" class="date-input" id="sale-date-input" value="${currentSaleDate}" max="${todayIso}" aria-label="Избери дата"/>
    </div>

    <div class="section">
      <h3 class="section-title"><span>Услуги</span><span style="font-weight:400">${dateLabel}: ${totalDay}</span></h3>
      ${state.services.length ? `<div class="item-list">${state.services.map(row).join('')}</div>` :
        `<div class="empty">${ICONS.plusCircle}<p>Добави услуга в Настройки.</p></div>`}
    </div>
  `;
}

function renderAnalysis() {
  const sales = salesInPeriod(currentPeriod);
  const counts = countByService(sales);
  const rows = Object.entries(counts).map(([id, c]) => ({ id, name: refName(id), count: c })).sort((a, b) => b.count - a.count);
  const maxC = Math.max(1, ...rows.map(r => r.count));
  const activeDays = new Set(sales.map(s => s.date)).size;

  return `
    ${renderTrendChart()}

    <div class="period-select">
      ${[['today','Днес'],['week','Седмица'],['month','Месец'],['all','Всичко']].map(([p, l]) =>
        `<button class="period-btn ${p === currentPeriod ? 'active' : ''}" data-period="${p}">${l}</button>`).join('')}
    </div>

    <div class="bento" style="grid-template-columns: 1fr 1fr; gap:8px;">
      <div class="bento-card" style="padding:12px 14px;">
        <p class="label">Продажби</p>
        <p class="num" style="font-size:20px;">${sales.length}</p>
      </div>
      <div class="bento-card" style="padding:12px 14px;">
        <p class="label">Активни дни</p>
        <p class="num" style="font-size:20px;">${activeDays}</p>
      </div>
    </div>

    ${state.goals.length ? `
    <div class="section">
      <h3 class="section-title">Прогрес по цели</h3>
      <div class="goals-grid ${state.goals.length === 1 ? 'single' : ''}">
        ${[...state.goals.filter(g => g.period === 'day'), ...state.goals.filter(g => g.period === 'month')].map(g => renderGoalCard(g)).join('')}
      </div>
    </div>` : ''}

    <div class="section">
      <h3 class="section-title">По услуга</h3>
      ${rows.length ? `<div>${rows.map(r => { const c = serviceColor(r.id); return `
        <div class="rank-row">
          <div class="cat-icon" style="background:${c}">${initial(r.name)}</div>
          <div class="rank-info">
            <p class="rank-name">${esc(r.name)}</p>
            <div class="rank-bar"><div style="width:${(r.count / maxC) * 100}%; background:${c}"></div></div>
          </div>
          <div class="rank-value">${r.count}</div>
        </div>`; }).join('')}</div>` :
        `<div class="empty">${ICONS.chartBarOff}<p>Няма продажби за този период.</p></div>`}
    </div>
  `;
}

function renderGoalEditor(g) {
  return `
    <div class="goal-editor">
      <label class="goal-editor-label">Име на целта</label>
      <input type="text" class="goal-editor-input" value="${esc(g.name)}" data-update-goal="${g.id}" data-field="name" aria-label="Име на целта"/>

      <label class="goal-editor-label">${g.period === 'day' ? 'Дневен' : 'Месечен'} таргет (точки)</label>
      <input type="number" class="goal-editor-input" value="${g.target}" min="0" step="1" inputmode="numeric" data-update-goal="${g.id}" data-field="target" aria-label="Точки за цел"/>

      ${state.services.length ? `
        <label class="goal-editor-label">Услуги в целта</label>
        <p class="helper" style="font-size:11px;margin:0 0 6px">Точките се настройват в "Услуги" секцията.</p>
        <div class="goal-svc-list">
          ${state.services.map(s => {
            const inc = g.services.includes(s.id);
            return `
              <div class="goal-svc-row">
                <label class="goal-svc-check">
                  <input type="checkbox" ${inc ? 'checked' : ''} data-toggle-svc="${g.id}:${s.id}"/>
                  <div class="cat-icon" style="background:${serviceColor(s.id)}">${initial(s.name)}</div>
                  <span>${esc(s.name)}</span>
                </label>
                <span class="goal-svc-pts-readonly">${fmt(s.points || 0)} т.</span>
              </div>`;
          }).join('')}
        </div>` : `<p class="helper" style="margin:14px 0 0">Първо добави услуги, за да ги включиш тук.</p>`}

      <div class="goal-editor-footer">
        <button class="btn-delete-goal" data-action="del-goal" data-id="${g.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14H7L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Изтрий тази цел
        </button>
      </div>
    </div>
  `;
}

function renderSettings() {
  const monthlyGoals = state.goals.filter(g => g.period === 'month');
  const dailyGoals = state.goals.filter(g => g.period === 'day');

  const goalRow = g => `
    <div class="item ${editingGoalId === g.id ? 'item-expanded' : ''}">
      <div class="cat-icon goal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      </div>
      <div class="item-info">
        <p class="item-name">${esc(g.name)}</p>
        <p class="item-meta">${g.target} т. · ${g.services.length} услуги вкл.</p>
      </div>
      <button class="btn-settings ${editingGoalId === g.id ? 'active' : ''}" data-action="edit-goal" data-id="${g.id}">
        ${editingGoalId === g.id ? 'Затвори' : 'Настрой'}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    ${editingGoalId === g.id ? renderGoalEditor(g) : ''}
  `;

  const goalsSection = (title, helperText, period, goals, defaultTarget) => `
    <div class="section">
      <h3 class="section-title"><span>${title}</span><span style="font-weight:400">${goals.length}</span></h3>
      <p class="helper">${helperText}</p>
      <div class="item-list">
        ${goals.length ? goals.map(goalRow).join('') : `<div class="empty"><p>Няма ${period === 'day' ? 'дневни' : 'месечни'} цели.</p></div>`}
      </div>
      <div class="form-card">
        <div class="form-row">
          <input type="text" id="ng-name-${period}" placeholder="Име на нова цел" maxlength="40"/>
          <input type="number" id="ng-target-${period}" placeholder="т." min="1" step="1" value="${defaultTarget}" aria-label="Цел"/>
          <button class="btn-primary" data-action="add-goal" data-period="${period}">${ICONS.plus}Добави</button>
        </div>
      </div>
    </div>
  `;

  return `
    ${goalsSection('Месечни цели', 'Цели за целия месец — нулират се на първи всеки месец.', 'month', monthlyGoals, 400)}
    ${goalsSection('Дневни цели', 'Цели за един ден — нулират се всяка нощ.', 'day', dailyGoals, 50)}

    <div class="section">
      <h3 class="section-title"><span>Услуги</span><span style="font-weight:400">${state.services.length}</span></h3>
      <p class="helper">Точките се задават тук — една услуга носи едни и същи точки за всяка цел в която е включена.</p>
      <div class="item-list">
        ${state.services.length ? state.services.map(s => {
          if (editingServiceId === s.id) {
            return `
              <div class="item">
                <div class="cat-icon" style="background:${serviceColor(s.id)}">${initial(s.name)}</div>
                <input type="text" class="edit-input" id="edit-svc-name" value="${esc(s.name)}" maxlength="40" placeholder="Име"/>
                <input type="number" class="edit-pts-input" id="edit-svc-points" value="${s.points ?? 1}" min="0" step="any" inputmode="decimal" placeholder="т." aria-label="Точки"/>
                <span class="unit">т.</span>
                <button class="btn-icon primary" data-action="save-edit-service" aria-label="Запази">${ICONS.check}</button>
                <button class="btn-icon" data-action="cancel-edit-service" aria-label="Откажи">${ICONS.x}</button>
              </div>`;
          }
          const info = serviceGoalsInfo(s.id);
          const goalsTxt = info.count === 0 ? 'не е в активна цел' : info.count === 1 ? `в "${esc(info.names[0])}"` : `в ${info.count} цели`;
          return `
            <div class="item">
              <div class="cat-icon" style="background:${serviceColor(s.id)}">${initial(s.name)}</div>
              <div class="item-info">
                <p class="item-name">${esc(s.name)}</p>
                <p class="item-meta">${fmt(s.points || 0)} т. · ${goalsTxt}</p>
              </div>
              <button class="btn-icon" data-action="edit-service" data-id="${s.id}" aria-label="Промени">${ICONS.edit}</button>
              <button class="btn-icon danger" data-action="del-service" data-id="${s.id}" aria-label="Премахни">${ICONS.trash}</button>
            </div>`;
        }).join('') : `<div class="empty"><p>Няма услуги.</p></div>`}
      </div>
      <div class="form-card">
        <div class="form-row">
          <input type="text" id="ns-name" placeholder="Име на услуга" maxlength="40"/>
          <input type="number" id="ns-points" placeholder="т." min="0" step="any" value="1" inputmode="decimal" aria-label="Точки"/>
          <button class="btn-primary" data-action="add-service">${ICONS.plus}Добави</button>
        </div>
      </div>
    </div>
  `;
}

document.addEventListener('click', e => {
  const v = e.target.closest('[data-view]');
  if (v) { currentView = v.dataset.view; render(); return; }
  const p = e.target.closest('[data-period]');
  if (p && !p.dataset.action) { currentPeriod = p.dataset.period; render(); return; }
  const a = e.target.closest('[data-action]');
  if (!a) return;
  const act = a.dataset.action;
  if (act === 'inc') logSale(a.dataset.id, 1);
  else if (act === 'dec') logSale(a.dataset.id, -1);
  else if (act === 'set-today') { currentSaleDate = todayISO(); render(); }
  else if (act === 'edit-service') startEditService(a.dataset.id);
  else if (act === 'save-edit-service') saveEditService();
  else if (act === 'cancel-edit-service') cancelEditService();
  else if (act === 'del-service') { if (confirm('Премахни услугата? Ще се махне от всички цели.')) removeService(a.dataset.id); }
  else if (act === 'del-goal') { if (confirm('Премахни тази цел?')) removeGoal(a.dataset.id); }
  else if (act === 'edit-goal') toggleEditGoal(a.dataset.id);
  else if (act === 'add-service') {
    const name = document.getElementById('ns-name').value.trim();
    const ptsRaw = parseFloat(document.getElementById('ns-points').value);
    const points = isFinite(ptsRaw) ? Math.max(0, ptsRaw) : 1;
    const r = addService(name, points);
    if (r === 'invalid') alert('Въведи име.');
    if (r === 'exists') alert('Услугата вече съществува.');
  }
  else if (act === 'add-goal') {
    const period = a.dataset.period || 'month';
    const name = document.getElementById(`ng-name-${period}`).value.trim();
    const target = +document.getElementById(`ng-target-${period}`).value;
    const r = addGoal(name, target, period);
    if (r === 'invalid') alert('Въведи име и положителен таргет.');
  }
});

document.addEventListener('change', e => {
  if (e.target.id === 'sale-date-input') {
    let v = e.target.value;
    if (!v) v = todayISO();
    if (v > todayISO()) v = todayISO();
    currentSaleDate = v;
    render();
    return;
  }
  const t = e.target.dataset.toggleSvc;
  if (t) { const [g, s] = t.split(':'); toggleServiceInGoal(g, s); return; }
  const ug = e.target.dataset.updateGoal;
  if (ug) { updateGoal(ug, e.target.dataset.field, e.target.value); return; }
});

document.addEventListener('keydown', e => {
  if (e.target.id === 'edit-svc-name' || e.target.id === 'edit-svc-points') {
    if (e.key === 'Enter') { e.preventDefault(); saveEditService(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancelEditService(); }
  }
});

render();
</script>
</body>
</html>
